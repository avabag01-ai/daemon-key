<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>데몬키</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
body {
  background: #111620; color: #ccc;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  height: 100dvh; overflow: hidden; touch-action: none;
}
#output {
  width: 100%; max-width: 500px; flex: 1;
  background: #0d1220; padding: 16px;
  font-size: 28px; line-height: 1.6; word-break: break-all;
  overflow-y: auto; display: flex; align-items: flex-end;
}
#output .composing { border-bottom: 2px solid #e94560; color: #e94560; }

#word-bar {
  width: 100%; max-width: 500px; height: 40px; min-height: 40px;
  background: #0d1628; border-top: 1px solid #1a2540; border-bottom: 1px solid #1a2540;
  display: flex; align-items: center; gap: 2px;
  overflow-x: auto; overflow-y: hidden; padding: 0 6px;
  scrollbar-width: none;
}
#word-bar::-webkit-scrollbar { display: none; }
.word-candidate {
  flex-shrink: 0; height: 30px; padding: 0 13px;
  background: #182238; border: 1px solid #253050; border-radius: 6px;
  font-size: 15px; color: #7aaeff; display: flex; align-items: center;
  cursor: pointer; white-space: nowrap;
}
#status {
  width: 100%; max-width: 500px; height: 22px;
  font-size: 11px; color: #334; text-align: center; line-height: 22px;
  background: #0d1220;
}
#keyboard {
  width: 100%; max-width: 500px;
  padding: 6px 4px 10px; background: #151c2e;
  display: flex; flex-direction: column; gap: 5px;
}
.key-row { display: flex; gap: 5px; justify-content: center; }
.key {
  flex: 1; height: 54px;
  background: #1c2640; border: 1px solid #252f4a; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; cursor: pointer; touch-action: none;
  transition: background 0.06s, border-color 0.06s, transform 0.06s;
}
/* 한글 자음 (큰 글자) */
.key .ko { font-size: 20px; color: #ccc; line-height: 1; }
/* 영어 힌트 (작은 글자, 오른쪽 위) */
.key .en-hint {
  position: absolute; top: 4px; right: 5px;
  font-size: 9px; color: #2a5090; font-weight: bold; line-height: 1;
}
/* 순수 영어 전용 키 (자음 없음) */
.key .en-only { font-size: 16px; color: #2a5090; line-height: 1; }
/* 쌍자음 힌트 */
.key .dbl-hint {
  position: absolute; top: 3px; left: 5px;
  font-size: 8px; color: #223; line-height: 1;
}
.key.special { background: #0f1520; border-color: #1a2035; }
.key.special .ko { font-size: 13px; color: #445; }
/* 활성 상태 */
.key.active-cho { background: #c0283e !important; border-color: #e94560 !important; transform: scale(0.94); z-index:5; }
.key.active-cho .ko { color: #fff !important; }
/* 영어 스와이프 하이라이트 */
.key.en-lit { background: #0a2550 !important; border-color: #3a7fff !important; }
.key.en-lit .en-hint, .key.en-lit .en-only { color: #7af !important; }

/* 방사형 버블 */
#vowel-layer { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:60; }
.vowel-bubble {
  position:absolute; width:46px; height:46px;
  background:#0e1e3a; border:1.5px solid #1a3a6a; border-radius:50%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transform:translate(-50%,-50%); pointer-events:none;
  transition:background 0.08s,border-color 0.08s,transform 0.08s;
}
.vowel-bubble .v-char { font-size:17px; color:#5a8aee; line-height:1; }
.vowel-bubble .v-merged { font-size:9px; color:#2a4a6a; margin-top:1px; }
.vowel-bubble.near { width:52px; height:52px; }
.vowel-bubble.near .v-char { font-size:19px; }
.vowel-bubble.highlighted {
  background:#1a4a8a !important; border-color:#4a8fff !important;
  transform:translate(-50%,-50%) scale(1.2) !important;
  box-shadow:0 0 18px rgba(74,143,255,0.6);
}
.vowel-bubble.highlighted .v-char { color:#fff !important; font-size:21px; }
.vowel-bubble.highlighted .v-merged { color:rgba(255,255,255,0.7) !important; }
#big-preview {
  position:fixed; top:33%; left:50%; transform:translate(-50%,-50%);
  font-size:140px; color:rgba(233,69,96,0.16); font-weight:bold;
  pointer-events:none; z-index:50; display:none;
}
#trail-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:40; }

/* 숫자패드 오버레이 */
#numpad {
  display: none;
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 500px;
  background: #0d1422; border-top: 2px solid #2a4080;
  padding: 8px 6px 14px; z-index: 100;
  flex-direction: column; gap: 5px;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.6);
}
#numpad.show { display: flex; }
#numpad .key-row { display: flex; gap: 5px; justify-content: center; }
.num-key {
  flex: 1; height: 60px;
  background: #182440; border: 1px solid #2a3a60; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #aad0ff; cursor: pointer; touch-action: none;
  transition: background 0.06s;
}
.num-key:active, .num-key.pressed { background: #1e3a70; color: #fff; }
.num-key.wide { flex: 2; }
.num-key.special-num { font-size: 14px; color: #445; background: #0f1520; }
#numpad-hint {
  text-align: center; font-size: 10px; color: #2a4060;
  padding-bottom: 2px; letter-spacing: 1px;
}
</style>
</head>
<body>
<div id="output"><span id="committed"></span><span class="composing" id="composing"></span></div>
<div id="word-bar"></div>
<div id="status">자음+모음=한글 / 영어는 키 위에서 쭉 그으세요</div>
<div id="keyboard"></div>
<div id="vowel-layer"></div>
<div id="big-preview"></div>
<canvas id="trail-canvas"></canvas>

<!-- 두 손가락 터치 시 나타나는 숫자패드 -->
<div id="numpad">
  <div id="numpad-hint">↑ 두 손가락 위로 쓸어올리면 닫힘</div>
  <div class="key-row">
    <div class="num-key" data-num="1">1</div>
    <div class="num-key" data-num="2">2</div>
    <div class="num-key" data-num="3">3</div>
  </div>
  <div class="key-row">
    <div class="num-key" data-num="4">4</div>
    <div class="num-key" data-num="5">5</div>
    <div class="num-key" data-num="6">6</div>
  </div>
  <div class="key-row">
    <div class="num-key" data-num="7">7</div>
    <div class="num-key" data-num="8">8</div>
    <div class="num-key" data-num="9">9</div>
  </div>
  <div class="key-row">
    <div class="num-key special-num" data-num=".">.</div>
    <div class="num-key wide" data-num="0">0</div>
    <div class="num-key special-num" data-num="DEL">⌫</div>
  </div>
</div>

<script>
// ============================================================
// 한글 조합
// ============================================================
const CHOSUNG  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNGSUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JONGSUNG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const CHOSUNG_IDX={};  CHOSUNG.forEach((c,i)=>CHOSUNG_IDX[c]=i);
const JUNGSUNG_IDX={}; JUNGSUNG.forEach((c,i)=>JUNGSUNG_IDX[c]=i);
const JONGSUNG_IDX={}; JONGSUNG.forEach((c,i)=>{if(c)JONGSUNG_IDX[c]=i;});
const JONGSUNG_SPLIT={'ㄳ':['ㄱ','ㅅ'],'ㄵ':['ㄴ','ㅈ'],'ㄶ':['ㄴ','ㅎ'],'ㄺ':['ㄹ','ㄱ'],'ㄻ':['ㄹ','ㅁ'],'ㄼ':['ㄹ','ㅂ'],'ㄽ':['ㄹ','ㅅ'],'ㄾ':['ㄹ','ㅌ'],'ㄿ':['ㄹ','ㅍ'],'ㅀ':['ㄹ','ㅎ'],'ㅄ':['ㅂ','ㅅ']};
const COMBINE_JONG={'ㄱ':{'ㅅ':'ㄳ'},'ㄴ':{'ㅈ':'ㄵ','ㅎ':'ㄶ'},'ㄹ':{'ㄱ':'ㄺ','ㅁ':'ㄻ','ㅂ':'ㄼ','ㅅ':'ㄽ','ㅌ':'ㄾ','ㅍ':'ㄿ','ㅎ':'ㅀ'},'ㅂ':{'ㅅ':'ㅄ'}};
function compose(cho,jung,ji=0){const ci=CHOSUNG_IDX[cho],ji2=JUNGSUNG_IDX[jung];if(ci===undefined||ji2===undefined)return null;return String.fromCharCode(0xAC00+(ci*21+ji2)*28+ji);}
function decompose(ch){const code=ch.charCodeAt(0)-0xAC00;if(code<0||code>11171)return null;const jong=code%28,jung=Math.floor(code/28)%21,cho=Math.floor(code/28/21);return{cho:CHOSUNG[cho],jung:JUNGSUNG[jung],jong:JONGSUNG[jong],jongIdx:jong};}

// ============================================================
// 모음 배치 — 방사형
// ============================================================
const VOWEL_LAYOUT = [
  {angle:0,  dist:1,v:'ㅗ'}, {angle:180,dist:1,v:'ㅜ'},
  {angle:90, dist:1,v:'ㅏ'}, {angle:270,dist:1,v:'ㅓ'},
  {angle:45, dist:1,v:'ㅣ'}, {angle:225,dist:1,v:'ㅡ'},
  {angle:0,  dist:2,v:'ㅛ'}, {angle:180,dist:2,v:'ㅠ'},
  {angle:90, dist:2,v:'ㅑ'}, {angle:270,dist:2,v:'ㅕ'},
  {angle:315,dist:2,v:'ㅐ'}, {angle:135,dist:2,v:'ㅔ'},
  {angle:60, dist:2,v:'ㅘ'}, {angle:240,dist:2,v:'ㅝ'},
  {angle:30, dist:3,v:'ㅚ'}, {angle:210,dist:3,v:'ㅟ'},
  {angle:315,dist:3,v:'ㅒ'}, {angle:135,dist:3,v:'ㅖ'},
  {angle:75, dist:3,v:'ㅙ'}, {angle:255,dist:3,v:'ㅞ'},
  {angle:45, dist:3,v:'ㅢ'},
];
const DIST_R = {1:68, 2:115, 3:158};

// ============================================================
// 레이아웃 정의
// 각 키: { ko: 한글자음(없으면null), en: 영어알파벳, type: 'normal'|'special' }
// ============================================================
// 자음 16개 → 영어 a~p (순서대로)
// 나머지 10자리: q~z (10개)
const LAYOUT_ROWS = [
  [ {ko:'ㄱ',en:'a'}, {ko:'ㄴ',en:'b'}, {ko:'ㄷ',en:'c'}, {ko:'ㄹ',en:'d'} ],
  [ {ko:'ㅁ',en:'e'}, {ko:'ㅂ',en:'f'}, {ko:'ㅅ',en:'g'}, {ko:'ㅇ',en:'h'} ],
  [ {ko:'ㅈ',en:'i'}, {ko:'ㅊ',en:'j'}, {ko:'ㅋ',en:'k'}, {ko:'ㅌ',en:'l'} ],
  [ {ko:'ㅍ',en:'m'}, {ko:'ㅎ',en:'n'}, {ko:null,en:'o'}, {ko:null,en:'p'} ],
  [ {ko:null,en:'q'}, {ko:null,en:'r'}, {ko:null,en:'s'}, {ko:null,en:'t'} ],
  [ {ko:null,en:'u'}, {ko:null,en:'v'}, {ko:null,en:'w'}, {ko:null,en:'x'} ],
  [ {ko:null,en:'y'}, {ko:null,en:'z'}, {ko:'.',en:'.',type:'punct'}, {ko:'DEL',en:'DEL',type:'del'} ],
  [ {ko:'SPC',en:'SPC',type:'spc'}, {ko:'SPC',en:'SPC',type:'spc'}, {ko:'SPC',en:'SPC',type:'spc'}, {ko:'SPC',en:'SPC',type:'spc'} ],
];
const DOUBLE_CHO = {'ㄱ':'ㄲ','ㄷ':'ㄸ','ㅂ':'ㅃ','ㅅ':'ㅆ','ㅈ':'ㅉ'};

// ============================================================
// 단어 예측
// ============================================================
let wordFreq = {};
try { wordFreq = JSON.parse(localStorage.getItem('dk_wordFreq')||'{}'); } catch(e){}
function saveWordFreq(){try{localStorage.setItem('dk_wordFreq',JSON.stringify(wordFreq));}catch(e){}}
function recordWord(word){
  word=word.trim();
  if(!word||word.length<2)return;
  wordFreq[word]=(wordFreq[word]||0)+1;
  saveWordFreq();
}
function getCurrentWord(){
  const c=state.composing;
  const cs=c?(c.jung?(compose(c.cho,c.jung,c.jongIdx||0)||(c.cho+c.jung)):c.cho):'';
  const full=state.committed+cs+(enSwipe.active?enSwipe.word:'');
  const ls=full.lastIndexOf(' ');
  return full.slice(ls+1);
}
function getCandidates(){
  const cur=getCurrentWord();
  if(cur.length<1)return[];
  return Object.entries(wordFreq)
    .filter(([w])=>w.startsWith(cur)&&w.length>cur.length)
    .sort((a,b)=>b[1]-a[1]).slice(0,10).map(([w])=>w);
}
function updateWordBar(){
  const bar=document.getElementById('word-bar');
  // 영어 스와이프 중이면 현재 글자 표시
  let extra=[];
  if(enSwipe.active&&enSwipe.word) extra=[enSwipe.word];
  const candidates=[...extra,...getCandidates()].slice(0,10);
  bar.innerHTML='';
  candidates.forEach((word,idx)=>{
    const el=document.createElement('div');
    el.className='word-candidate';
    if(idx===0&&enSwipe.active) el.style.color='#ffcc44';
    el.textContent=word;
    let _sx=0,_sy=0,_moved=false;
    el.addEventListener('pointerdown',e=>{_sx=e.clientX;_sy=e.clientY;_moved=false;});
    el.addEventListener('pointermove',e=>{if(Math.hypot(e.clientX-_sx,e.clientY-_sy)>10)_moved=true;});
    el.addEventListener('pointerup',e=>{if(!_moved)applyCandidate(word);});
    bar.appendChild(el);
  });
}
function applyCandidate(word){
  const cur=getCurrentWord();
  commitComposing();
  enSwipe={active:false,keys:[],word:''};
  clearEnLit();
  if(state.committed.endsWith(cur))
    state.committed=state.committed.slice(0,state.committed.length-cur.length);
  state.committed+=word;
  recordWord(word);
  state.composing=null;
  updateOutput();
}

// ============================================================
// 상태
// ============================================================
let state={committed:'',composing:null};
let drag={active:false,cho:null,choEl:null,startX:0,startY:0,currentVowel:null,trail:[],bubbles:[]};
let lastTap={key:null,time:0};
// 영어 스와이프 상태
let enSwipe={active:false,keys:[],word:''};
// 영어 키 위치 캐시: {letter -> {el,cx,cy,hw,hh}}
let enKeyPos={};

// ============================================================
// DOM 빌드
// ============================================================
const kbEl=document.getElementById('keyboard');
const vowelLayer=document.getElementById('vowel-layer');
let allKeyEls=[];

function buildKeyboard(){
  kbEl.innerHTML=''; allKeyEls=[]; enKeyPos={};

  LAYOUT_ROWS.forEach(row=>{
    const rowEl=document.createElement('div');
    rowEl.className='key-row';

    // 스페이스 행: 하나로 병합
    if(row.every(k=>k.type==='spc')){
      const el=document.createElement('div');
      el.className='key special';
      el.innerHTML='<span class="ko">space</span>';
      el.style.flex='1';
      rowEl.appendChild(el); allKeyEls.push({el,item:{type:'spc'}});
      kbEl.appendChild(rowEl); return;
    }

    row.forEach(item=>{
      const el=document.createElement('div');
      el.className='key';

      if(item.type==='del'){
        el.classList.add('special');
        el.innerHTML='<span class="ko">⌫</span>';
      } else if(item.type==='spc'){
        el.classList.add('special');
        el.innerHTML='<span class="ko">space</span>';
      } else if(item.type==='punct'){
        el.classList.add('special');
        el.innerHTML='<span class="ko" style="font-size:18px;color:#88aacc">.</span>';
      } else if(item.ko){
        // 한글 자음 + 영어 힌트
        let html=`<span class="ko">${item.ko}</span><span class="en-hint">${item.en}</span>`;
        if(DOUBLE_CHO[item.ko]) html=`<span class="dbl-hint">${DOUBLE_CHO[item.ko]}</span>`+html;
        el.innerHTML=html;
      } else {
        // 영어 전용 키 (한글 없음)
        el.innerHTML=`<span class="en-only">${item.en}</span>`;
        el.style.background='#141e32';
        el.style.borderColor='#1a2540';
      }

      rowEl.appendChild(el);
      allKeyEls.push({el,item});
    });
    kbEl.appendChild(rowEl);
  });

  // 영어 키 위치 캐시 (렌더 후)
  requestAnimationFrame(()=>{
    allKeyEls.forEach(({el,item})=>{
      if(item.en && item.en.length===1 && item.en>='a' && item.en<='z'){
        const r=el.getBoundingClientRect();
        enKeyPos[item.en]={el, cx:r.left+r.width/2, cy:r.top+r.height/2, hw:r.width/2, hh:r.height/2};
      }
    });
    bindKeyEvents();
  });
}

// ============================================================
// 캔버스
// ============================================================
const canvas=document.getElementById('trail-canvas');
const ctx=canvas.getContext('2d');
function resizeCanvas(){canvas.width=innerWidth;canvas.height=innerHeight;}
resizeCanvas(); window.addEventListener('resize',()=>{resizeCanvas();buildKeyboard();});

function drawKoTrail(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const t=drag.trail;
  if(!drag.active||t.length<2)return;
  ctx.beginPath(); ctx.moveTo(t[0].x,t[0].y);
  t.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='rgba(233,69,96,0.35)';
  ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
}
function drawEnTrail(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const pts=enSwipe.keys.map(k=>enKeyPos[k]).filter(Boolean);
  if(pts.length<2)return;
  ctx.beginPath(); ctx.moveTo(pts[0].cx,pts[0].cy);
  pts.forEach(p=>ctx.lineTo(p.cx,p.cy));
  ctx.strokeStyle='rgba(80,160,255,0.45)';
  ctx.lineWidth=4; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
}

// ============================================================
// 방사형 버블
// ============================================================
function showVowelBubbles(cx,cy,cho){
  vowelLayer.innerHTML=''; drag.bubbles=[];
  VOWEL_LAYOUT.forEach(item=>{
    const rad=item.angle*Math.PI/180;
    const r=DIST_R[item.dist];
    const bx=cx+Math.cos(rad)*r, by=cy-Math.sin(rad)*r;
    if(bx<20||bx>innerWidth-20||by<20||by>innerHeight-20)return;
    const merged=compose(cho,item.v,0)||(cho+item.v);
    const el=document.createElement('div'); el.className='vowel-bubble';
    if(item.dist===1)el.classList.add('near');
    el.style.left=bx+'px'; el.style.top=by+'px';
    const vc=document.createElement('span'); vc.className='v-char'; vc.textContent=item.v;
    const vm=document.createElement('span'); vm.className='v-merged'; vm.textContent=merged;
    el.appendChild(vc); el.appendChild(vm);
    vowelLayer.appendChild(el);
    drag.bubbles.push({el,vowel:item.v,merged,x:bx,y:by,dist:item.dist});
  });
}
function hideVowelBubbles(){vowelLayer.innerHTML='';drag.bubbles=[];}
function findClosestBubble(px,py){
  const SR={1:50,2:55,3:50};
  let best=null,bestD=Infinity;
  drag.bubbles.forEach(b=>{
    const d=Math.hypot(px-b.x,py-b.y);
    if(d<(SR[b.dist]||50)&&d<bestD){bestD=d;best=b;}
  });
  return best;
}

// ============================================================
// 영어 스와이프
// ============================================================
function getEnKeyAt(px,py){
  for(const [letter,pos] of Object.entries(enKeyPos)){
    if(Math.abs(px-pos.cx)<=pos.hw+6&&Math.abs(py-pos.cy)<=pos.hh+8) return letter;
  }
  return null;
}
function clearEnLit(){
  allKeyEls.forEach(({el})=>el.classList.remove('en-lit'));
}
function enSwipeMove(px,py){
  const letter=getEnKeyAt(px,py);
  if(!letter)return;
  const last=enSwipe.keys[enSwipe.keys.length-1];
  if(letter===last)return;
  enSwipe.keys.push(letter);
  enSwipe.word=enSwipe.keys.join('');
  enKeyPos[letter]?.el.classList.add('en-lit');
  updateStatus('→ '+enSwipe.word);
  updateWordBar();
  drawEnTrail();
}
function enSwipeEnd(){
  const word=enSwipe.word;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  clearEnLit();
  if(word.length>=1){
    commitComposing();
    state.committed+=word;
    if(word.length>=2) recordWord(word);
  }
  enSwipe={active:false,keys:[],word:''};
  updateOutput();
  updateStatus('자음+모음=한글 / 영어는 키 위에서 쭉 그으세요');
}

// ============================================================
// 이벤트
// ============================================================
function bindKeyEvents(){
  allKeyEls.forEach(({el,item})=>{
    el.addEventListener('pointerdown',e=>{
      e.preventDefault();
      if(item.type==='spc'){inputSpace();return;}
      if(item.type==='del'){inputDelete();return;}
      if(item.type==='punct'){inputPunct('.');return;}

      // 영어 전용 키 or 영어 스와이프 시작
      // 포인터를 잡고 드래그하면 영어 스와이프
      // 포인터를 잡고 떼면(이동 없으면) → 한글 자음 탭 or 영어 탭
      const letter=item.en;
      const now=Date.now();

      // 영어 스와이프 시작 (항상)
      if(letter&&letter>='a'&&letter<='z'){
        enSwipe={active:true,keys:[letter],word:letter};
        el.classList.add('en-lit');
        el.setPointerCapture(e.pointerId);
        updateStatus('→ '+letter);
        updateWordBar();
      }

      // 한글 자음 드래그(버블) 시작도 동시에 준비 (모음 버블은 ko 키에서만)
      if(item.ko&&item.ko.length===1&&item.ko>='ㄱ'){
        let cho=item.ko;
        if(lastTap.key===item.ko&&now-lastTap.time<320&&DOUBLE_CHO[item.ko]){
          cho=DOUBLE_CHO[item.ko]; lastTap={key:null,time:0};
        } else { lastTap={key:item.ko,time:now}; }

        const rect=el.getBoundingClientRect();
        const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
        drag={active:true,cho,choEl:el,
          startX:e.clientX,startY:e.clientY,currentVowel:null,trail:[{x:e.clientX,y:e.clientY}],bubbles:[]};
        el.classList.add('active-cho');
        showVowelBubbles(cx,cy,cho);
      }
    });
  });
}

document.addEventListener('pointermove',e=>{
  const px=e.clientX,py=e.clientY;

  // 영어 스와이프 이동
  if(enSwipe.active) enSwipeMove(px,py);

  // 한글 드래그 이동
  if(drag.active){
    drag.trail.push({x:px,y:py});
    const closest=findClosestBubble(px,py);
    drag.bubbles.forEach(b=>b.el.classList.remove('highlighted'));
    if(closest){
      closest.el.classList.add('highlighted');
      drag.currentVowel=closest.vowel;
      showBigPreview(closest.merged);
      updateStatus(`${drag.cho} + ${closest.vowel} = ${closest.merged}`);
    } else {
      drag.currentVowel=null;
      showBigPreview('');
    }
    drawKoTrail();
  }
});

document.addEventListener('pointerup',e=>{
  const moved=drag.active&&Math.hypot(e.clientX-drag.startX,e.clientY-drag.startY)>8;
  const enMoved=enSwipe.active&&enSwipe.keys.length>1;

  // 영어: 키를 지나간 게 있으면 영어 스와이프 완료, 없으면 영어 탭(단일 글자)
  if(enSwipe.active){
    if(enMoved){
      // 드래그로 영어 단어 입력
      enSwipeEnd();
    } else {
      // 단일 탭 — 한글 자음 있는 키: 한글 처리, 영어 전용 키: 영어 글자 입력
      clearEnLit();
      ctx.clearRect(0,0,canvas.width,canvas.height);
      enSwipe={active:false,keys:[],word:''};
      if(drag.active){
        // 한글 자음 키를 탭 → 모음 없이 자음만
        hideVowelBubbles();
        drag.choEl?.classList.remove('active-cho');
        showBigPreview('');
        inputConsonantOnly(drag.cho);
        drag={active:false,cho:null,choEl:null,startX:0,startY:0,currentVowel:null,trail:[],bubbles:[]};
      } else {
        // 영어 전용 키 탭 → 영어 글자 하나
        const letter=enSwipe.word||'';
        if(letter) { commitComposing(); state.committed+=letter; updateOutput(); }
      }
    }
    updateStatus('자음+모음=한글 / 영어는 키 위에서 쭉 그으세요');
    return;
  }

  // 순수 한글 드래그
  if(drag.active){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    showBigPreview('');
    hideVowelBubbles();
    drag.choEl?.classList.remove('active-cho');
    if(drag.currentVowel){
      inputConsonantVowel(drag.cho,drag.currentVowel);
    } else {
      inputConsonantOnly(drag.cho);
    }
    drag={active:false,cho:null,choEl:null,startX:0,startY:0,currentVowel:null,trail:[],bubbles:[]};
    updateStatus('자음+모음=한글 / 영어는 키 위에서 쭉 그으세요');
  }
});

// ============================================================
// 입력 로직
// ============================================================
function inputConsonantOnly(cho){
  if(!state.composing){state.composing={cho,jung:null,jong:null,jongIdx:0};}
  else if(!state.composing.jung){commitComposing();state.composing={cho,jung:null,jong:null,jongIdx:0};}
  else if(!state.composing.jong){
    if(JONGSUNG_IDX[cho]!==undefined){state.composing.jong=cho;state.composing.jongIdx=JONGSUNG_IDX[cho];}
    else{commitComposing();state.composing={cho,jung:null,jong:null,jongIdx:0};}
  } else {
    const c=COMBINE_JONG[state.composing.jong]?.[cho];
    if(c){state.composing.jong=c;state.composing.jongIdx=JONGSUNG_IDX[c];}
    else{commitComposing();state.composing={cho,jung:null,jong:null,jongIdx:0};}
  }
  updateOutput();
}
function inputConsonantVowel(cho,vowel){
  if(!state.composing){state.composing={cho,jung:vowel,jong:null,jongIdx:0};}
  else if(!state.composing.jung){
    if(state.composing.cho===cho){state.composing.jung=vowel;}
    else{commitComposing();state.composing={cho,jung:vowel,jong:null,jongIdx:0};}
  } else if(!state.composing.jong){
    commitComposing();state.composing={cho,jung:vowel,jong:null,jongIdx:0};
  } else {
    const jong=state.composing.jong;
    let movingCho,remainJong,remainJongIdx;
    if(JONGSUNG_SPLIT[jong]){[remainJong,movingCho]=JONGSUNG_SPLIT[jong];remainJongIdx=JONGSUNG_IDX[remainJong];}
    else{movingCho=jong;remainJong=null;remainJongIdx=0;}
    state.composing.jong=remainJong;state.composing.jongIdx=remainJongIdx;
    const prev=compose(state.composing.cho,state.composing.jung,remainJongIdx);
    state.committed+=prev||(state.composing.cho+state.composing.jung);
    state.composing={cho:movingCho,jung:vowel,jong:null,jongIdx:0};
  }
  updateOutput();
}
function inputPunct(ch){commitComposing();state.committed+=ch;updateOutput();}
function commitComposing(){
  if(!state.composing)return;
  const c=state.composing;
  state.committed+=c.jung?(compose(c.cho,c.jung,c.jongIdx||0)||(c.cho+c.jung)):c.cho;
  state.composing=null;
}
function inputSpace(){
  const word=getCurrentWord();
  commitComposing();
  recordWord(word);
  state.committed+=' ';
  updateOutput();
}
function inputDelete(){
  if(enSwipe.active&&enSwipe.word.length>0){
    enSwipe.keys.pop();
    enSwipe.word=enSwipe.keys.join('');
    updateWordBar();
    return;
  }
  if(state.composing){
    const c=state.composing;
    if(c.jong){
      if(JONGSUNG_SPLIT[c.jong]){c.jong=JONGSUNG_SPLIT[c.jong][0];c.jongIdx=JONGSUNG_IDX[c.jong];}
      else{c.jong=null;c.jongIdx=0;}
    }else if(c.jung){c.jung=null;}
    else{state.composing=null;}
  }else if(state.committed.length>0){
    const last=state.committed.slice(-1);
    state.committed=state.committed.slice(0,-1);
    const d=decompose(last);
    if(d)state.composing={cho:d.cho,jung:d.jung,jong:null,jongIdx:0};
  }
  updateOutput();
}

// ============================================================
// 렌더링
// ============================================================
function updateOutput(){
  document.getElementById('committed').textContent=state.committed;
  const c=state.composing;
  document.getElementById('composing').textContent=c
    ?(c.jung?(compose(c.cho,c.jung,c.jongIdx||0)||(c.cho+c.jung)):c.cho):'';
  updateWordBar();
}
function showBigPreview(ch){const el=document.getElementById('big-preview');el.textContent=ch;el.style.display=ch?'block':'none';}
function updateStatus(msg){document.getElementById('status').textContent=msg;}

// ============================================================
// 숫자패드 — 두 손가락 터치
// ============================================================
const numpad = document.getElementById('numpad');
let numpadOpen = false;
let activePointers = new Set();

// 숫자패드 열기/닫기
function openNumpad() {
  if(numpadOpen) return;
  numpadOpen = true;
  numpad.classList.add('show');
  // 진행 중인 한글/영어 입력 중단
  hideVowelBubbles();
  drag.choEl?.classList.remove('active-cho');
  showBigPreview('');
  clearEnLit();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drag = {active:false,cho:null,choEl:null,startX:0,startY:0,currentVowel:null,trail:[],bubbles:[]};
  enSwipe = {active:false,keys:[],word:''};
  updateStatus('숫자 입력 중 — 두 손가락 떼면 닫힘');
}
function closeNumpad() {
  if(!numpadOpen) return;
  numpadOpen = false;
  numpad.classList.remove('show');
  updateStatus('자음+모음=한글 / 영어는 키 위에서 쭉 그으세요');
}

// 두 손가락 드래그 감지 — 아래로 40px↓ → 열기, 위로 40px↑ → 닫기
let twoFingerStartY = null;
let twoFingerHandled = false;
document.getElementById('keyboard').addEventListener('touchstart', e => {
  if(e.touches.length >= 2) {
    e.preventDefault();
    twoFingerStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    twoFingerHandled = false;
  }
}, {passive: false});
document.getElementById('keyboard').addEventListener('touchmove', e => {
  if(e.touches.length >= 2 && twoFingerStartY !== null && !twoFingerHandled) {
    e.preventDefault();
    const curY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const dy = curY - twoFingerStartY;
    if(!numpadOpen && dy > 40) {
      twoFingerHandled = true;
      openNumpad();
    } else if(numpadOpen && dy < -40) {
      twoFingerHandled = true;
      closeNumpad();
    }
  }
}, {passive: false});
document.addEventListener('touchend', e => {
  if(e.touches.length < 2) {
    twoFingerStartY = null;
    twoFingerHandled = false;
  }
});

// 숫자패드 키 입력
numpad.querySelectorAll('.num-key').forEach(el => {
  el.addEventListener('pointerdown', e => {
    e.stopPropagation();
    const num = el.dataset.num;
    el.classList.add('pressed');
    if(num === 'DEL') {
      inputDelete();
    } else {
      commitComposing();
      state.committed += num;
      updateOutput();
    }
  });
  el.addEventListener('pointerup', () => el.classList.remove('pressed'));
  el.addEventListener('pointercancel', () => el.classList.remove('pressed'));
});

buildKeyboard();
updateOutput();
</script>
